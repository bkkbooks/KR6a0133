body:
  text: 後漢安息沙門安世高譯聞如是一時婆伽婆在舍衛城祇樹給孤獨園爾時世尊告諸比丘昔有四婆羅門仙人精進修善法五通常恐畏死時四婆羅門仙人精進修善法五通便作是念我等當住何處永存在世時彼有一婆羅門精進修善法有大神力五通便入空中於中則無有死彼入空者便命過第二婆羅門精進修善法五通畏死便入大海中我於海中則無有死彼即於海中命過第三婆羅門精進修善法有大威勢五通畏死便入山腹即於彼命終彼第四婆羅門精進修善法五通有大威勢畏死便入地我於彼當脫不死便於地命過時世尊以天眼見清淨無瑕觀彼四婆羅門精進修善法有大威勢五通畏死一人處虛空於彼命過一人入海亦於彼命過一人入山腹於彼命過一人入地於彼命過爾時世尊見彼四婆羅門精進修善法五通有大威勢便說偈言非空非海中非入山石間無有地方所脫之不受死爾時比丘聞佛所說歡喜奉行
